substitutions:
  _REGION: asia-south1
  _SERVICE: maa-ki-rasoi-api
  _REPO: maa-ki-rasoi
  _TAG: latest

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/maa-ki-rasoi-app-2026/${_REPO}/api:${_TAG}'
      - -t
      - '${_REGION}-docker.pkg.dev/maa-ki-rasoi-app-2026/${_REPO}/api:latest'
      - .

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/maa-ki-rasoi-app-2026/${_REPO}/api'
    waitFor: ['build-image']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/maa-ki-rasoi-app-2026/${_REPO}/api:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--port=8080'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,FAST2SMS_API_KEY=FAST2SMS_API_KEY:latest,RAZORPAY_KEY_ID=RAZORPAY_KEY_ID:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest,CORS_ORIGIN=CORS_ORIGIN:latest,ADMIN_EMAILS=ADMIN_EMAILS:latest'
      - '--set-env-vars=NODE_ENV=production'
    waitFor: ['push-image']

images:
  - '${_REGION}-docker.pkg.dev/maa-ki-rasoi-app-2026/${_REPO}/api:${_TAG}'
  - '${_REGION}-docker.pkg.dev/maa-ki-rasoi-app-2026/${_REPO}/api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
